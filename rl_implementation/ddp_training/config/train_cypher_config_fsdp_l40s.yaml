# =============================================================================
# Cypher Generator Training Configuration - FSDP on 4x L40S (48GB each)
# =============================================================================
# Train Cypher Generator using FSDP (Fully Sharded Data Parallel) for
# memory-efficient training across 2 GPUs.
#
# FSDP with FULL_SHARD shards model weights, gradients, and optimizer states,
# reducing per-GPU memory from ~40GB to ~25-30GB.
#
# Usage:
#   CUDA_VISIBLE_DEVICES=0,1 torchrun --nproc_per_node=2 \
#     scripts/train_cypher_from_rollouts.py --config config/train_cypher_config_fsdp_l40s.yaml
# =============================================================================

# =============================================================================
# FSDP Configuration
# =============================================================================
# Enable FSDP training
use_fsdp: true

# Sharding strategy: FULL_SHARD (maximum memory savings)
# - FULL_SHARD: Shard weights + gradients + optimizer states
# - SHARD_GRAD_OP: Only shard gradients + optimizer states
# - NO_SHARD: No sharding (like DDP)
sharding_strategy: FULL_SHARD

# Backward prefetch strategy
# - BACKWARD_PRE: Prefetch next layer during backward (faster)
# - BACKWARD_POST: No prefetch (less memory)
backward_prefetch: BACKWARD_PRE

# CPU offload (very slow but saves GPU memory)
cpu_offload: false

# =============================================================================
# Rollouts Configuration
# =============================================================================
rollouts_path: /nfs/turbo/umms-drjieliu/usr/rickyhan/rllm/examples/PanKLLM_RL_post-training/outputs/stage1_ddp/rollouts_collect_base_model.jsonl

# Filtering options
min_reward: 0.1

# Balanced sampling for better GRPO performance
use_balanced_sampling: true

# =============================================================================
# Prompt Configuration
# =============================================================================
rebuild_prompts: false
schema_path: /nfs/turbo/umms-drjieliu/usr/rickyhan/rllm/examples/PanKLLM_RL_post-training/legacy/PankBaseAgent/text_to_cypher/data/input/kg_schema.json

# =============================================================================
# Model Configuration
# =============================================================================
cypher_model_path: /nfs/turbo/umms-drjieliu/usr/rickyhan/rllm/examples/PanKLLM_RL_post-training/models/qwen2.5-coder-14b

# LoRA configuration
lora_rank: 128
lora_alpha: 256
lora_dropout: 0.05

# =============================================================================
# Output Configuration
# =============================================================================
checkpoint_dir: /nfs/turbo/umms-drjieliu/usr/rickyhan/rllm/examples/PanKLLM_RL_post-training/outputs/cypher_trained
log_dir: /nfs/turbo/umms-drjieliu/usr/rickyhan/rllm/examples/PanKLLM_RL_post-training/outputs/cypher_trained/logs

# =============================================================================
# Training Configuration
# =============================================================================
num_epochs: 10

# Batch size - total samples for PPO/GRPO update
# Larger = better advantage estimation and more stable GRPO training
# Memory is controlled by mini_batch_size, so this can be large
batch_size: 16

# Learning rate
learning_rate: 5.0e-6

# Weight decay
weight_decay: 0.01

# Max gradient norm for clipping
max_grad_norm: 1.0

# Warmup steps
warmup_steps: 50

# Save checkpoint every N epochs
save_frequency: 1

# =============================================================================
# PPO/GRPO Configuration
# =============================================================================
clip_ratio: 0.2
entropy_coeff: 0.01
use_kl_penalty: false
kl_coeff: 0.1
grpo_baseline: mean
normalize_advantages: true
ppo_epochs: 1

# Mini-batch size for forward passes during log prob computation
# Small value reduces peak memory (L40S with 48GB needs this)
# Setting to 1 for maximum memory safety - does NOT affect training quality
mini_batch_size: 1

# =============================================================================
# Precision and Memory
# =============================================================================
use_bf16: true

# Gradient checkpointing saves activation memory
gradient_checkpointing: true

# Maximum sequence length
# With FSDP, we can use full 4096 on L40S 48GB
max_length: 4096

