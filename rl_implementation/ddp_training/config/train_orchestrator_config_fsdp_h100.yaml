# =============================================================================
# Orchestrator Training Configuration - FSDP on 4x H100 (80GB each)
# =============================================================================
# Train Orchestrator using FSDP (Fully Sharded Data Parallel) for
# memory-efficient training across 2 GPUs.
#
# H100 (80GB) allows larger batch sizes and mini-batch sizes compared to L40S.
# This results in faster training without memory constraints.
#
# Usage:
#   CUDA_VISIBLE_DEVICES=2,3 torchrun --nproc_per_node=2 \
#     scripts/train_orchestrator_from_rollouts.py --config config/train_orchestrator_config_fsdp_h100.yaml
# =============================================================================

# =============================================================================
# FSDP Configuration
# =============================================================================
# Enable FSDP training
use_fsdp: true

# Sharding strategy: FULL_SHARD (maximum memory savings)
sharding_strategy: FULL_SHARD

# Backward prefetch strategy
backward_prefetch: BACKWARD_PRE

# CPU offload (not needed for H100 80GB)
cpu_offload: false

# =============================================================================
# Rollouts Configuration
# =============================================================================
rollouts_path: /nfs/turbo/umms-drjieliu/usr/rickyhan/rllm/examples/PanKLLM_RL_post-training/outputs/stage1_ddp/rollouts_collect_base_model.jsonl

# Filtering options
min_reward: 0.1

# Balanced sampling
use_balanced_sampling: true

# =============================================================================
# Prompt Configuration
# =============================================================================
rebuild_prompts: false
schema_path: /nfs/turbo/umms-drjieliu/usr/rickyhan/rllm/examples/PanKLLM_RL_post-training/legacy/PankBaseAgent/text_to_cypher/data/input/kg_schema.json

# =============================================================================
# Model Configuration
# =============================================================================
orchestrator_model_path: /nfs/turbo/umms-drjieliu/usr/rickyhan/rllm/examples/PanKLLM_RL_post-training/models/qwen2.5-14b

# LoRA configuration
lora_rank: 128
lora_alpha: 256
lora_dropout: 0.05

# =============================================================================
# Output Configuration
# =============================================================================
checkpoint_dir: /nfs/turbo/umms-drjieliu/usr/rickyhan/rllm/examples/PanKLLM_RL_post-training/outputs/orchestrator_trained
log_dir: /nfs/turbo/umms-drjieliu/usr/rickyhan/rllm/examples/PanKLLM_RL_post-training/outputs/orchestrator_trained/logs

# =============================================================================
# Training Configuration (H100 80GB - Higher throughput)
# =============================================================================
num_epochs: 10

# Full batch size for GRPO (larger = better advantage estimates)
batch_size: 32

# Mini-batch size for forward passes (H100 can handle larger mini-batches)
mini_batch_size: 4

learning_rate: 5.0e-6
weight_decay: 0.01
max_grad_norm: 1.0
warmup_steps: 50
save_frequency: 1

# =============================================================================
# Orchestrator Role Configuration
# =============================================================================
# Train question generation role
train_qgen: true
qgen_weight: 0.7

# Train answer synthesis role
train_synth: true
synth_weight: 0.3

# =============================================================================
# PPO/GRPO Configuration
# =============================================================================
clip_ratio: 0.2
entropy_coeff: 0.01
use_kl_penalty: false
kl_coeff: 0.1
grpo_baseline: mean
normalize_advantages: true
ppo_epochs: 1

# =============================================================================
# Precision and Memory (H100 80GB - No constraints)
# =============================================================================
use_bf16: true
gradient_checkpointing: true

# No activation offloading needed for H100
activation_offloading: false

# Full sequence length
max_length: 4096

# =============================================================================
# Memory Estimate for H100 (80GB VRAM) with FSDP FULL_SHARD (2 GPUs)
# =============================================================================
# Sharded model weights (14B bf16):   ~14 GB per GPU
# LoRA adapters (rank=128):           ~0.5 GB
# Sharded optimizer states:           ~14 GB per GPU
# Sharded gradients:                  ~14 GB per GPU
# Activations (batch=32, seq=4096):   ~15-20 GB
# Safety buffer:                      ~10 GB
# -----------------------------------------
# Total per GPU:                      ~55-65 GB ✓ (fits in 80GB)
# =============================================================================

